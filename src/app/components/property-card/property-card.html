<div class="property-card card hover-shadow h-100" (click)="onCardClick()">
  <div class="position-relative">
    <span class="position-absolute top-0 end-0 m-2 badge {{ getStatusClass() }}">
      {{ getStatusText() }}
    </span>
    
    <button class="btn btn-light position-absolute top-0 start-0 m-2 rounded-circle shadow-sm"
            (click)="onFavoriteClick($event)">
      <i class="fas" [class.fa-heart]="property.isFavorite" 
                    [class.fa-heart-o]="!property.isFavorite"
                    [class.text-danger]="property.isFavorite"></i>
    </button>
    
    <img [src]="property.images[0] || 'assets/images/placeholder.jpg'" 
         class="card-img-top property-image" 
         [alt]="property.title">
    
    <span *ngIf="property.model3dUrl" 
          class="position-absolute bottom-0 end-0 m-2 badge bg-info">
      <i class="fas fa-cube me-1"></i> 3D
    </span>
  </div>
  
  <div class="card-body">
    <h5 class="card-title text-truncate">{{ property.title }}</h5>
    <p class="card-text text-muted small">{{ property.description | slice:0:100 }}...</p>
    
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="price-tag fw-bold">{{ formatPrice(property.price) }}</span>
      <span class="badge bg-secondary">{{ property.type }}</span>
    </div>
    
    <div class="property-features">
      <div class="d-flex justify-content-between text-center">
        <div>
          <i class="fas fa-bed text-primary"></i>
          <div class="small">{{ property.features.bedrooms }} ch.</div>
        </div>
        <div>
          <i class="fas fa-bath text-primary"></i>
          <div class="small">{{ property.features.bathrooms }} sdb</div>
        </div>
        <div>
          <i class="fas fa-ruler-combined text-primary"></i>
          <div class="small">{{ property.features.area }} m²</div>
        </div>
      </div>
    </div>
    
    <div class="mt-3">
      <span class="text-muted small">
        <i class="fas fa-map-marker-alt me-1"></i>
        {{ property.address.city }}
      </span>
    </div>
  </div>
  
  <div class="card-footer bg-transparent">
    <button class="btn btn-primary w-100">
      <i class="fas fa-eye me-2"></i>Voir détails
    </button>
  </div>
</div>
